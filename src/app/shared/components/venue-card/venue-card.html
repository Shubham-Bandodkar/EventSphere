<div class="venue-card card">

    <div class="image-wrapper">

        <img
            [src]="venue.image"
            [alt]="venue.name">

        @if(venue.verified){

            <div class="verified">

                ✓ Verified

            </div>

        }

        <button class="wishlist">

            ❤

        </button>

    </div>

    <div class="content">

        <h3>

            {{venue.name}}

        </h3>

        <div class="rating">

            ⭐ {{venue.rating}}

            <span>

                ({{venue.reviewCount}} Reviews)

            </span>

        </div>

        <p>

            📍 {{venue.location}}

        </p>

        <p>

            👥 Up to {{venue.capacity}} Guests

        </p>

        <div class="bottom">

            <div>

                <small>Starting From</small>

                <h4>

                    ₹{{venue.price | number}}

                </h4>

            </div>

            <button class="primary-btn">

                View Details

            </button>

        </div>

    </div>

</div>
