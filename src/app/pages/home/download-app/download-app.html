<section class="download-section">

    <div class="container">

        <!-- LEFT -->

        <div class="content">

            <app-badge text="New">
            </app-badge>

            <h2>

                Get the EventSphere App

            </h2>

            <p class="subtitle">

                Book events, discover venues, hire vendors and manage your bookings anytime, anywhere.

            </p>

            <div class="features">

                <app-feature-item icon="verified_user" title="Secure Booking"
                    description="Trusted vendors with secure online payments.">
                </app-feature-item>

                <app-feature-item icon="confirmation_number" title="Digital Tickets"
                    description="Access all your tickets directly in the app.">
                </app-feature-item>

                <app-feature-item icon="notifications_active" title="Live Notifications"
                    description="Receive reminders and booking updates instantly.">
                </app-feature-item>

                <app-feature-item icon="local_offer" title="Exclusive Deals"
                    description="Unlock app-only discounts and offers.">
                </app-feature-item>

            </div>

            <div class="store-buttons">

                <app-store-button platform="apple">
                </app-store-button>

                <app-store-button platform="google">
                </app-store-button>

            </div>

        </div>

        <!-- RIGHT -->

        <div class="phone-wrapper">

            <div class="phone-glass">

                <app-phone-mockup image="assets/images/app/home-screen.png">
                </app-phone-mockup>

            </div>
        </div>

    </div>

</section>
