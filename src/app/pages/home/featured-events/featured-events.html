<section class="section" appAnimateOnScroll>
    <div class="container">

        <app-section-header

            title="Featured Events"

            subtitle="Discover the most popular events happening around Goa."

        />

        <div class="event-grid">

            <app-event-card

                *ngFor="let event of events"

                [event]="event">

            </app-event-card>

        </div>

    </div>

</section>
